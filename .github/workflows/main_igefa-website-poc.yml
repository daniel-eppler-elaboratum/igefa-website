name: Deploy to Azure App Service

# Deployt die SSR-Astro-App (Node-Server) auf Azure App Service.
# Ausgeloest bei jedem Push auf main; manueller Start ueber "Run workflow" moeglich.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Name der Azure Web App (im Azure-Portal beim Anlegen vergeben).
# Bei Bedarf hier anpassen.
env:
  AZURE_WEBAPP_NAME: igefa-website-poc
  NODE_VERSION: '20'

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Alle Abhaengigkeiten installieren (inkl. dev) — fuer den Build noetig.
      - name: Install dependencies
        run: npm ci

      # SSR-Build: erzeugt dist/server (Node-Server) und dist/client (statische Assets).
      - name: Build
        run: npm run build

      # Dev-Abhaengigkeiten entfernen, damit das Deploy-Paket nur die
      # Produktiv-Module enthaelt (kleiner + schneller).
      - name: Prune dev dependencies
        run: npm prune --omit=dev

      # Nur die fuer den Betrieb noetigen Dateien ins Deploy-Paket legen.
      - name: Assemble deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp -r node_modules deploy/
          cp package.json deploy/
          cp package-lock.json deploy/

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
